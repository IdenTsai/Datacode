<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>給 米果寶貝 的特別驚喜</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4ff; /* 稍微調整底色配星星 */
            margin: 0;
            overflow: hidden;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .container {
            position: relative;
            width: 90vw;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .shape-outline {
            stroke: #ffd700; /* 星星改為金色 */
            stroke-width: 6;
            fill: transparent;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: drawOutline 3s forwards ease-in-out;
        }

        @keyframes drawOutline {
            to { stroke-dashoffset: 0; }
        }

        .shape-fill {
            fill: #ffea00;
            opacity: 0;
            transform-origin: center;
            transform: scale(0);
        }

        .shape-fill.animate {
            animation: pulseExpand 2s infinite ease-out;
        }

        @keyframes pulseExpand {
            0% { transform: scale(0); opacity: 0.8; }
            70% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .shape-solid {
            fill: #ffd700;
            opacity: 0;
            transform-origin: center;
            transition: opacity 1s ease;
        }

        .shape-solid.show {
            opacity: 0.9;
            animation: colorShift 6s infinite alternate ease-in-out;
        }

        @keyframes colorShift {
            0% { fill: #ffd700; }
            50% { fill: #ffb700; }
            100% { fill: #ff9500; }
        }

        .text-group {
            position: absolute;
            top: 52%; /* 稍微下調一點，星星中心視覺上較低 */
            left: 50%;
            transform: translate(-50%, -50%);
            color: #5d4037;
            opacity: 0;
            z-index: 20;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.8);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .text-group.show {
            opacity: 1;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: gentleBeat 1.5s infinite alternate ease-in-out;
        }

        .line1 {
            font-size: clamp(24px, 8vw, 36px);
            font-weight: 900;
            white-space: nowrap;
        }

        .line2 {
            font-size: clamp(18px, 6vw, 26px);
            font-weight: 700;
            white-space: nowrap;
        }

        @keyframes gentleBeat {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.06); }
        }

        .signature {
            position: fixed;
            right: 20px;
            bottom: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: #ffb700;
            opacity: 0;
            z-index: 30;
        }

        .signature.show { opacity: 0.8; transition: opacity 2s; }

        .bg-star { position: fixed; color: #ffd700; z-index: 1; pointer-events: none; animation: floatUp 4s forwards ease-in; }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) rotate(0deg); }
            20% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-100px) rotate(90deg); }
        }

        .particle { position: absolute; pointer-events: none; z-index: 100; animation: popOut 1s forwards ease-out; font-size: 26px; }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5); opacity: 0; }
        }

        #clickArea { position: absolute; width: 100%; height: 100%; cursor: pointer; z-index: 30; }
    </style>
</head>
<body>

    <div class="container">
        <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
            <defs>
                <path id="starPath" d="M 200,40 L 247,145 L 360,155 L 275,230 L 300,340 L 200,285 L 100,340 L 125,230 L 40,155 L 153,145 Z"></path>
            </defs>
            <use href="#starPath" class="shape-solid" id="solidFill" />
            <use href="#starPath" class="shape-fill" id="expandingFill" />
            <use href="#starPath" class="shape-outline" id="outline" />
        </svg>
        
        <div id="textGroup" class="text-group">
            <div class="line1">米果寶貝</div>
            <div class="line2">三月快樂✨</div>
        </div>
        
        <div id="clickArea"></div>
    </div>

    <div id="signature" class="signature">Iden</div>

    <script>
        const outline = document.getElementById('outline');
        const expandingFill = document.getElementById('expandingFill');
        const solidFill = document.getElementById('solidFill');
        const textGroup = document.getElementById('textGroup');
        const signature = document.getElementById('signature');
        const clickArea = document.getElementById('clickArea');

        outline.addEventListener('animationend', () => {
            expandingFill.classList.add('animate');
            setTimeout(() => {
                solidFill.classList.add('show');
                textGroup.classList.add('show');
                signature.classList.add('show');
                startBgStars();
            }, 500);
        });

        clickArea.addEventListener('click', (e) => {
            if (!textGroup.classList.contains('show')) return;
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = ['⭐', '✨', '🌟'][Math.floor(Math.random() * 3)];
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                const angle = Math.random() * Math.PI * 2, dist = 60 + Math.random() * 80;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        });

        function startBgStars() {
            setInterval(() => {
                const bh = document.createElement('div');
                bh.className = 'bg-star';
                bh.innerText = '⭐';
                bh.style.left = Math.random() * 100 + 'vw';
                bh.style.top = Math.random() * 100 + 'vh';
                bh.style.fontSize = (Math.random() * 10 + 10) + 'px';
                document.body.appendChild(bh);
                setTimeout(() => bh.remove(), 4000);
            }, 600);
        }
    </script>
</body>
</html>
